<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CareerMentor AI</title>
<link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>

  <nav class="sidebar-nav">
    <button class="nav-btn active" data-mode="chat" title="Chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span>CHAT</span>
    </button>

    <button class="nav-btn" data-mode="ats" title="ATS Analysis">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      <span>ATS</span>
    </button>

    <button class="nav-btn" data-mode="coach" title="Career Coach">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <span>COACH</span>
    </button>

    <button class="nav-btn" data-mode="cover" title="Cover Letter">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
        <polyline points="22,6 12,13 2,6"/>
      </svg>
      <span>COVER</span>
    </button>

    <button class="nav-btn" data-mode="resume" title="Resume Review">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
      <span>RESUME</span>
    </button>

    <button class="nav-btn" data-mode="skills" title="Skills Analysis">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="20" x2="18" y2="10"/>
        <line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
      <span>SKILLS</span>
    </button>
  </nav>

  <button class="nav-btn reset-btn" id="resetBtn" title="Reset Chat">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="1 4 1 10 7 10"/>
      <path d="M3.51 15a9 9 0 1 0 .49-3.5"/>
    </svg>
    <span>RESET</span>
  </button>
</aside>

<!-- MAIN -->
<main class="main">

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <h1 id="headerTitle">Career Chatbot</h1>
      <p id="headerSubtitle">Ask anything about your career, resume, or job search</p>
    </div>
    <div class="header-right">
      <button class="export-btn" id="exportBtn" title="Export chat">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Export
      </button>
      <span class="gemini-badge">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        Powered by Gemini AI
      </span>
    </div>
  </header>

  <!-- CHAT AREA -->
  <div class="chat-area" id="chatArea">
    <!-- Welcome screen -->
    <div class="welcome-screen" id="welcomeScreen">
      <div class="welcome-robot">🤖</div>
      <h2>Hi! I'm CareerMentor AI 👋</h2>
      <p>Ask me anything about your career, resume, job search, or interviews.</p>
      <div class="quick-actions">
        <button class="quick-btn" data-msg="Please review my resume and give me detailed feedback.">📄 Resume Review</button>
        <button class="quick-btn" data-msg="Create a detailed career roadmap for me.">🗺️ Career Roadmap</button>
        <button class="quick-btn" data-msg="Suggest some portfolio project ideas for my field.">💡 Project Ideas</button>
        <button class="quick-btn" data-msg="Help me prepare for a technical interview.">📋 Interview Prep</button>
        <button class="quick-btn" data-msg="Analyze skill gaps in my career and suggest what to learn.">🎯 Skill Gap</button>
      </div>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages"></div>
  </div>

  <!-- RESUME CONTEXT BANNER -->
  <div class="resume-banner" id="resumeBanner" style="display:none;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    <span id="resumeFilename">Resume loaded</span>
    <button id="clearResume" title="Remove resume">✕</button>
  </div>

  <!-- INPUT BAR -->
  <div class="input-bar">
    <button class="attach-btn" id="attachBtn" title="Upload Resume PDF">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
      </svg>
    </button>
    <input type="file" id="fileInput" accept=".pdf" style="display:none;" />
    <textarea
      id="messageInput"
      placeholder="Ask me anything about your career..."
      rows="1"
    ></textarea>
    <button class="send-btn" id="sendBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

</main>

<script src="/static/app.js"></script>
</body>
</html>
